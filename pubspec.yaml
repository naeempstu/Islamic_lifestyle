name: islamic_lifestyle
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.3.0   # 🔥 FIXED (3.11 invalid — Flutter support করে না)

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3

  # Notifications
  flutter_local_notifications: ^21.0.0

  # State management + routing
  flutter_riverpod: ^2.5.1   # 🔥 FIXED (3.3.1 unstable)
  go_router: ^14.2.0         # 🔥 FIXED (17 unstable)

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  url_launcher: ^6.2.0

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  permission_handler: ^12.0.1

  # Maps
  flutter_map: ^6.0.0
  latlong2: ^0.9.1

  # 🔥 API (IMPORTANT)
  http: ^1.1.0    # Updated to satisfy google_fonts compatibility

  # Islamic features
  adhan: ^2.0.0+1
  hijri_calendar: ^1.0.7+7
  flutter_compass: ^0.8.1

  # UI
  google_fonts: ^8.0.2
  vibration: ^3.1.8

  # Auth
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/quran/
    - assets/data/duas.json
    - assets/data/dhikr.json
    - assets/data/hadith_sample.json